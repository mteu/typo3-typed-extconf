name: CGL
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  cgl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Prepare environment
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: 8.5
          tools: composer:v2, composer-unused
          coverage: none

      # Validation
      - name: Validate composer.json
        run: composer validate --no-check-lock

      # Install dependencies
      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # Analyze
      - name: Analyze dependencies
        run: composer cgl analyze:dependencies

      # Linting
      - name: Lint composer.json
        run: composer cgl lint:composer

      - name: Lint .editorconfig
        run: composer cgl lint:editorconfig

      - name: Lint PHP
        run: composer cgl lint:php

      - name: Lint YAML
        run: composer cgl lint:yaml

      # SCA
      - name: SCA PHP
        run: composer cgl sca:php -- --error-format github

      - name: Migration
        run: composer cgl sca:migrate:php --dry-run

      # Bundler
      - name: Check dependency extraction for TER vendor libraries
        run: composer extract-dependencies --print-file-contents --fail
